<!DOCTYPE html>
<html lang="en">
<head>

<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />

<title>miTEST - Sign In</title>

<link rel="stylesheet" href="style.css" />

<style>

.auth-page{
    min-height:100vh;
    display:flex;
    justify-content:center;
    align-items:center;
    padding:24px;
}

.auth-card{
    width:100%;
    max-width:420px;
    background:rgba(255,255,255,0.95);
    border:1px solid rgba(255,255,255,0.5);
    border-radius:32px;
    padding:32px 24px;
    backdrop-filter:blur(18px);
    box-shadow:0 10px 40px rgba(0,0,0,0.08);
}

.auth-title{
    font-size:2rem;
    font-weight:800;
    text-align:center;
    margin-bottom:10px;
}

.auth-subtitle{
    text-align:center;
    color:var(--text-secondary);
    margin-bottom:32px;
    line-height:1.5;
}

.form-group{
    margin-bottom:18px;
}

.input-label{
    display:block;
    margin-bottom:8px;
    font-size:0.9rem;
    font-weight:600;
}

.input-field{
    width:100%;
    height:56px;
    border:none;
    border-radius:18px;
    padding:0 18px;
    font-size:1rem;
    background:#f3f4f6;
    transition:0.25s;
}

.input-field:focus{
    outline:none;
    background:#fff;
    box-shadow:0 0 0 3px rgba(79,70,229,0.15);
}

.auth-btn{
    width:100%;
    height:56px;
    border:none;
    border-radius:18px;
    background:linear-gradient(135deg,#4F46E5,#6366F1);
    color:white;
    font-size:1rem;
    font-weight:700;
    cursor:pointer;
    transition:0.3s;
}

.auth-btn:hover{
    transform:translateY(-2px);
}

.google-btn{
    margin-top:14px;
    width:100%;
    height:56px;
    border:none;
    border-radius:18px;
    background:white;
    font-weight:700;
    cursor:pointer;
    display:flex;
    align-items:center;
    justify-content:center;
    gap:10px;
    box-shadow:0 4px 16px rgba(0,0,0,0.06);
}

.divider{
    text-align:center;
    margin:24px 0;
    color:#9ca3af;
    position:relative;
}

.divider::before,
.divider::after{
    content:"";
    position:absolute;
    top:50%;
    width:40%;
    height:1px;
    background:#e5e7eb;
}

.divider::before{
    left:0;
}

.divider::after{
    right:0;
}

.error-message{
    color:#ef4444;
    font-size:0.85rem;
    margin-top:8px;
    display:none;
}

.success-message{
    margin-top:18px;
    text-align:center;
    color:#10b981;
    font-weight:600;
    display:none;
}

.signup-link{
    margin-top:24px;
    text-align:center;
    font-size:0.92rem;
}

.signup-link a{
    color:#4F46E5;
    font-weight:700;
    text-decoration:none;
}

</style>

</head>

<body>

<main class="auth-page">

<div class="auth-card">

<h1 class="auth-title">Welcome Back 👋</h1>

<p class="auth-subtitle">
Sign in to continue your English journey
</p>

<form id="signInForm">

<div class="form-group">

<label class="input-label">
Email
</label>

<input
    type="email"
    class="input-field"
    id="email"
    placeholder="Enter your email"
/>

</div>

<div class="form-group">

<label class="input-label">
Password
</label>

<input
    type="password"
    class="input-field"
    id="password"
    placeholder="Enter your password"
/>

<div class="error-message" id="errorMessage">
This account doesn't exist yet! Please sign up now.
</div>

</div>

<button class="auth-btn" type="submit">
Sign In
</button>

</form>

<div class="divider">
OR
</div>

<button class="google-btn">

<img
src="https://www.gstatic.com/firebasejs/ui/2.0.0/images/auth/google.svg"
width="20"
/>

Continue with Google

</button>

<div class="success-message" id="successMessage">
Successfully signed in ✔️
</div>

<div class="signup-link">
Don't have an account?
<a href="#">
Sign Up
</a>
</div>

</div>

</main>

<script>

const form = document.getElementById("signInForm");

const errorMessage = document.getElementById("errorMessage");

const successMessage = document.getElementById("successMessage");

form.addEventListener("submit",(e)=>{

    e.preventDefault();

    const email = document.getElementById("email").value.trim();

    const password = document.getElementById("password").value.trim();

    errorMessage.style.display = "none";
    successMessage.style.display = "none";

    // Fake validation example
    if(email !== "test@gmail.com"){

        errorMessage.style.display = "block";

        return;
    }

    if(password.length < 6){

        errorMessage.textContent =
            "Password must contain at least 6 characters.";

        errorMessage.style.display = "block";

        return;
    }

    successMessage.style.display = "block";

});

</script>

</body>
</html>
